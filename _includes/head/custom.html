<!-- Mobile nav toggle -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var toggle = document.getElementById('mobile-menu-toggle');
  var mobileNav = document.getElementById('mobile-nav');
  if (toggle && mobileNav) {
    toggle.addEventListener('click', function() {
      toggle.classList.toggle('is-open');
      mobileNav.classList.toggle('is-open');
    });
  }
});
</script>

<!-- Matrix rain -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const canvas = document.getElementById('matrix-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  // Malayalam only
  const chars = 'аҙ…аҙҶаҙҮаҙҲаҙүаҙҠаҙӢаҙҺаҙҸаҙҗаҙ’аҙ“аҙ”аҙ•аҙ–аҙ—аҙҳаҙҷаҙҡаҙӣаҙңаҙқаҙһаҙҹаҙ аҙЎаҙўаҙЈаҙӨаҙҘаҙҰаҙ§аҙЁаҙӘаҙ«аҙ¬аҙӯаҙ®аҙҜаҙ°аҙІаҙөаҙ¶аҙ·аҙёаҙ№аҙіаҙҙаҙұаөәаө»аөјаөҪаөҫаөҝ';
  const charArray = [...chars];
  const FONT_SIZE = 18;
  const TEAL      = '#2dd4bf';
  const TEAL_HEAD = '#99f6e4';
  let cols, drops, speeds;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols   = Math.floor(canvas.width / FONT_SIZE);
    drops  = Array.from({ length: cols }, () => Math.random() * -(canvas.height / FONT_SIZE));
    speeds = Array.from({ length: cols }, () => 0.3 + Math.random() * 0.7);
  }

  function draw() {
    ctx.fillStyle = 'rgba(10, 22, 40, 0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = FONT_SIZE + 'px "Noto Sans Malayalam", sans-serif';

    for (let i = 0; i < drops.length; i++) {
      const y = Math.floor(drops[i]);
      ctx.fillStyle = TEAL_HEAD;
      ctx.globalAlpha = 0.85;
      ctx.fillText(charArray[Math.floor(Math.random() * charArray.length)], i * FONT_SIZE, y * FONT_SIZE);
      ctx.fillStyle = TEAL;
      ctx.globalAlpha = 0.45;
      ctx.fillText(charArray[Math.floor(Math.random() * charArray.length)], i * FONT_SIZE, (y - 1) * FONT_SIZE);
      ctx.globalAlpha = 1;
      if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.97) {
        drops[i] = Math.random() * -20;
        speeds[i] = 0.3 + Math.random() * 0.7;
      }
      drops[i] += speeds[i];
    }
  }

  resize();
  window.addEventListener('resize', resize);
  setInterval(draw, 45);
});
</script>
