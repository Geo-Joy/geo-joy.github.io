<!-- Matrix rain -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const canvas = document.getElementById('matrix-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  // Malayalam, Devanagari (Hindi), Kannada, Tamil, Telugu, Bengali, Gujarati, Gurmukhi
  const chars = [
    // Malayalam
    '犇歩ｴ籾ｴ伶ｴ倨ｴ吭ｴ壟ｴ巵ｴ憫ｴ杳ｴ樅ｴ游ｴ犇｡犇｢犇｣犇､犇･犇ｦ犇ｧ犇ｨ犇ｪ犇ｫ犇ｬ犇ｭ犇ｮ犇ｯ犇ｰ犇ｲ犇ｵ犇ｶ犇ｷ犇ｸ犇ｹ犇ｳ犇ｴ犇ｱ',
    // Devanagari (Hindi)
    '爨歩､籾､伶､倨､吭､壟､巵､憫､杳､樅､游､爨｡爨｢爨｣爨､爨･爨ｦ爨ｧ爨ｨ爨ｪ爨ｫ爨ｬ爨ｭ爨ｮ爨ｯ爨ｰ爨ｲ爨ｵ爨ｶ爨ｷ爨ｸ爨ｹ爨歩･財､ｷ爨､爭財､ｰ',
    // Kannada
    '犂歩ｲ籾ｲ伶ｲ倨ｲ吭ｲ壟ｲ巵ｲ憫ｲ杳ｲ樅ｲ游ｲ犂｡犂｢犂｣犂､犂･犂ｦ犂ｧ犂ｨ犂ｪ犂ｫ犂ｬ犂ｭ犂ｮ犂ｯ犂ｰ犂ｲ犂ｵ犂ｶ犂ｷ犂ｸ犂ｹ犂ｳ',
    // Tamil
    '牋歩ｮ吭ｮ壟ｮ樅ｮ游ｮ｣牋､牋ｨ牋ｪ牋ｮ牋ｯ牋ｰ牋ｲ牋ｵ牋ｴ牋ｳ牋ｱ牋ｩ',
    // Telugu
    '牴歩ｰ籾ｰ伶ｰ倨ｰ吭ｰ壟ｰ巵ｰ憫ｰ杳ｰ樅ｰ游ｰ牴｡牴｢牴｣牴､牴･牴ｦ牴ｧ牴ｨ牴ｪ牴ｫ牴ｬ牴ｭ牴ｮ牴ｯ牴ｰ牴ｲ牴ｵ牴ｶ牴ｷ牴ｸ牴ｹ',
    // Bengali
    '爬歩ｦ籾ｦ伶ｦ倨ｦ吭ｦ壟ｦ巵ｦ憫ｦ杳ｦ樅ｦ游ｦ爬｡爬｢爬｣爬､爬･爬ｦ爬ｧ爬ｨ爬ｪ爬ｫ爬ｬ爬ｭ爬ｮ爬ｯ爬ｰ爬ｲ爬ｶ爬ｷ爬ｸ爬ｹ',
    // Gujarati
    '爼歩ｪ籾ｪ伶ｪ倨ｪ壟ｪ巵ｪ憫ｪ杳ｪ游ｪ爼｡爼｢爼｣爼､爼･爼ｦ爼ｧ爼ｨ爼ｪ爼ｫ爼ｬ爼ｭ爼ｮ爼ｯ爼ｰ爼ｲ爼ｵ爼ｶ爼ｷ爼ｸ爼ｹ',
    // Gurmukhi (Punjabi)
    '爲歩ｨ籾ｨ伶ｨ倨ｨ吭ｨ壟ｨ巵ｨ憫ｨ杳ｨ樅ｨ游ｨ爲｡爲｢爲｣爲､爲･爲ｦ爲ｧ爲ｨ爲ｪ爲ｫ爲ｬ爲ｭ爲ｮ爲ｯ爲ｰ爲ｲ爲ｵ爲ｸ爲ｹ',
  ].join('');
  const charArray = [...chars]; // spread into proper Unicode code-point array
  const FONT_SIZE = 18;
  const TEAL      = '#2dd4bf';
  const TEAL_HEAD = '#99f6e4';
  let cols, drops, speeds;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols   = Math.floor(canvas.width / FONT_SIZE);
    drops  = Array.from({ length: cols }, () => Math.random() * -(canvas.height / FONT_SIZE));
    speeds = Array.from({ length: cols }, () => 0.3 + Math.random() * 0.7);
  }

  function draw() {
    ctx.fillStyle = 'rgba(10, 22, 40, 0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = FONT_SIZE + 'px "Noto Sans", "Noto Sans Malayalam", "Noto Sans Devanagari", sans-serif';

    for (let i = 0; i < drops.length; i++) {
      const y = Math.floor(drops[i]);
      ctx.fillStyle = TEAL_HEAD;
      ctx.globalAlpha = 0.85;
      ctx.fillText(charArray[Math.floor(Math.random() * charArray.length)], i * FONT_SIZE, y * FONT_SIZE);
      ctx.fillStyle = TEAL;
      ctx.globalAlpha = 0.45;
      ctx.fillText(charArray[Math.floor(Math.random() * charArray.length)], i * FONT_SIZE, (y - 1) * FONT_SIZE);
      ctx.globalAlpha = 1;
      if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.97) {
        drops[i] = Math.random() * -20;
        speeds[i] = 0.3 + Math.random() * 0.7;
      }
      drops[i] += speeds[i];
    }
  }

  resize();
  window.addEventListener('resize', resize);
  setInterval(draw, 45);
});
</script>

<!-- end custom head snippets -->
